<!DOCTYPE html>
<html>
<head>
    <title>Réservation</title>
    <link rel="stylesheet" href="style.css">

<body>

<header>
    <h1>SkyTravel</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="destinations.html">Destinations</a>
        <a href="services.html">Services</a>
        <a href="apropos.html">À propos</a>
        <a href="reservation.html">Réservation</a>
    </nav>
</header>

<section class="section">
    <h2>Réservez Votre Voyage</h2>
    <form id="reservationForm">
        <input type="text" placeholder="Nom Complet" required>
        <input type="email" placeholder="Email" required>
        <select required>
            <option value="">Choisir Destination</option>
            <option>Paris</option>
            <option>Dubaï</option>
            <option>Zanzibar</option>
        </select>
        <input type="number" placeholder="Nombre de personnes" required>
        
        <!-- Nouveau : Choix du mode de paiement -->
        <select id="moyenPaiement" required>
            <option value="">Choisir Moyen de Paiement</option>
            <option value="Mobile Money">Mobile Money</option>
            <option value="Orange Money">Orange Money</option>
            <option value="PayPal">PayPal</option>
        </select>

        <!-- Nouveau : Numéro de paiement -->
        <input type="text" id="numeroPaiement" placeholder="Numéro de paiement" required>

        <button type="submit">Réserver & Payer</button>
    </form>
</section>

<footer>
    © 2026 SkyTravel - Tous droits réservés
</footer>

<script src="script.js"></script>
</body>
</html>
